name: Build & Push Docker Image

# 何时构建并推送镜像到 GHCR（ghcr.io）：
#   - 每次 push 到 main（忽略纯文档改动）→ 自动重建并推 :latest + :<VERSION>-xy + :<短SHA>
#   - 也可在 Actions 页手动触发（Run workflow）
#
# 登录用 GITHUB_TOKEN，无需额外配置 Secrets。

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'backup_*/**'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: ver
        run: |
          echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ghcr.io/rusokey122/ombre-brain:latest
            ghcr.io/rusokey122/ombre-brain:${{ steps.ver.outputs.version }}-xy
            ghcr.io/rusokey122/ombre-brain:${{ steps.ver.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
